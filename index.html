<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CoorgCare Property Market</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI;
}

body{
background:#f2f4f7;
}

/* SPLASH */

#splash{
position:fixed;
top:0;
left:0;
height:100vh;
width:100%;
background:linear-gradient(135deg,#004aad,#00c6ff);
display:flex;
align-items:center;
justify-content:center;
color:white;
font-size:40px;
font-weight:bold;
animation:fadeOut 3s forwards;
z-index:1000;
}

@keyframes fadeOut{
0%{opacity:1}
80%{opacity:1}
100%{opacity:0;visibility:hidden}
}

/* HEADER */

header{
background:white;
padding:15px 30px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.logo{
font-size:24px;
font-weight:bold;
color:#004aad;
}

nav button{
padding:8px 14px;
border:none;
background:#004aad;
color:white;
border-radius:6px;
cursor:pointer;
}

/* LOGIN */

#authPage{
display:flex;
justify-content:center;
align-items:center;
height:80vh;
}

.authBox{
background:white;
padding:30px;
width:350px;
border-radius:10px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.authBox input,select{
width:100%;
margin:8px 0;
padding:10px;
border:1px solid #ddd;
border-radius:6px;
}

.authBox button{
width:100%;
padding:10px;
background:#004aad;
color:white;
border:none;
margin-top:10px;
border-radius:6px;
}

/* DASHBOARD */

#dashboard{
display:none;
padding:20px;
}

/* SEARCH */

.searchBar{
display:flex;
gap:10px;
margin-bottom:20px;
}

.searchBar input{
flex:1;
padding:10px;
border-radius:6px;
border:1px solid #ccc;
}

/* GRID */

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:20px;
}

/* PROPERTY CARD */

.card{
background:white;
border-radius:10px;
overflow:hidden;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
}

.card img{
width:100%;
height:180px;
object-fit:cover;
}

.card-body{
padding:15px;
}

.price{
color:#00a65a;
font-weight:bold;
}

.btn{
padding:8px 12px;
border:none;
border-radius:6px;
background:#004aad;
color:white;
margin-top:8px;
cursor:pointer;
}

.wishlist{
background:#ff4b5c;
}

/* SELLER PANEL */

#sellerPanel{
margin-top:20px;
background:white;
padding:20px;
border-radius:10px;
display:none;
}

#sellerPanel input{
width:100%;
margin:8px 0;
padding:10px;
border:1px solid #ddd;
border-radius:6px;
}

/* MODAL */

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
display:none;
align-items:center;
justify-content:center;
}

.modal-content{
background:white;
padding:20px;
border-radius:10px;
width:400px;
}

</style>
</head>

<body>

<div id="splash">CoorgCare Property</div>

<header>
<div class="logo">CoorgCare</div>
<nav>
<button onclick="logout()">Logout</button>
</nav>
</header>

<!-- LOGIN -->

<div id="authPage">

<div class="authBox">

<h2>Login / Register</h2>

<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">

<select id="role">
<option value="buyer">Buyer</option>
<option value="seller">Seller</option>
</select>

<button onclick="register()">Register</button>
<button onclick="login()">Login</button>

</div>

</div>

<!-- DASHBOARD -->

<div id="dashboard">

<div class="searchBar">
<input id="searchInput" placeholder="Search property location..." onkeyup="searchProperty()">
<button class="btn" onclick="showWishlist()">Wishlist</button>
</div>

<div class="grid" id="propertyList"></div>

<div id="sellerPanel">

<h3>Add Property</h3>

<input id="title" placeholder="Property Title">
<input id="location" placeholder="Location">
<input id="price" placeholder="Price">
<input type="file" id="image">
<input type="file" id="video">

<button class="btn" onclick="addProperty()">Add Property</button>

</div>

</div>

<div class="modal" id="modal">
<div class="modal-content" id="modalContent"></div>
</div>

<script>

/* ELEMENTS */

const username=document.getElementById("username")
const password=document.getElementById("password")
const role=document.getElementById("role")

const authPage=document.getElementById("authPage")
const dashboard=document.getElementById("dashboard")
const sellerPanel=document.getElementById("sellerPanel")

const propertyList=document.getElementById("propertyList")
const modal=document.getElementById("modal")
const modalContent=document.getElementById("modalContent")

/* REGISTER */

function register(){

if(!username.value || !password.value){
alert("Enter username and password")
return
}

let users=JSON.parse(localStorage.getItem("users"))||[]

let user={
username:username.value,
password:password.value,
role:role.value
}

users.push(user)

localStorage.setItem("users",JSON.stringify(users))

alert("Registered Successfully")

}

/* LOGIN */

function login(){

let users=JSON.parse(localStorage.getItem("users"))||[]

let user=users.find(u=>u.username===username.value && u.password===password.value)

if(user){

localStorage.setItem("currentUser",JSON.stringify(user))

startDashboard(user)

}else{
alert("Invalid login")
}

}

/* START DASHBOARD */

function startDashboard(user){

authPage.style.display="none"
dashboard.style.display="block"

if(user.role==="seller"){
sellerPanel.style.display="block"
}

loadProperties()

}

/* AUTO LOGIN */

window.onload=function(){

let user=JSON.parse(localStorage.getItem("currentUser"))

if(user){
startDashboard(user)
}

}

/* LOGOUT */

function logout(){
localStorage.removeItem("currentUser")
location.reload()
}

/* ADD PROPERTY */

function addProperty(){

if(!image.files[0]){
alert("Upload image")
return
}

let list=JSON.parse(localStorage.getItem("properties"))||[]

let img=URL.createObjectURL(image.files[0])
let vid=video.files[0] ? URL.createObjectURL(video.files[0]) : ""

let property={
title:title.value,
location:location.value,
price:price.value,
image:img,
video:vid
}

list.push(property)

localStorage.setItem("properties",JSON.stringify(list))

loadProperties()

}

/* LOAD PROPERTY */

function loadProperties(){

let list=JSON.parse(localStorage.getItem("properties"))||[]

propertyList.innerHTML=""

list.forEach((p,i)=>{

propertyList.innerHTML+=`

<div class="card">

<img src="${p.image}">

<div class="card-body">

<h3>${p.title}</h3>

<p>${p.location}</p>

<p class="price">₹ ${p.price}</p>

<button class="btn" onclick="viewProperty(${i})">View</button>
<button class="btn wishlist" onclick="addWishlist(${i})">❤</button>

</div>

</div>

`

})

}

/* VIEW PROPERTY */

function viewProperty(i){

let list=JSON.parse(localStorage.getItem("properties"))
let p=list[i]

modal.style.display="flex"

modalContent.innerHTML=`

<h2>${p.title}</h2>
<img src="${p.image}" style="width:100%;margin-top:10px">

${p.video?`<video controls width="100%" style="margin-top:10px">
<source src="${p.video}">
</video>`:""}

<p>${p.location}</p>
<p class="price">₹ ${p.price}</p>

<button class="btn" onclick="closeModal()">Close</button>

`

}

function closeModal(){
modal.style.display="none"
}

/* WISHLIST */

function addWishlist(i){

let wish=JSON.parse(localStorage.getItem("wishlist"))||[]

wish.push(i)

localStorage.setItem("wishlist",JSON.stringify(wish))

alert("Added to wishlist")

}

function showWishlist(){

let wish=JSON.parse(localStorage.getItem("wishlist"))||[]
let list=JSON.parse(localStorage.getItem("properties"))||[]

propertyList.innerHTML=""

wish.forEach(i=>{

let p=list[i]

propertyList.innerHTML+=`

<div class="card">

<img src="${p.image}">

<div class="card-body">

<h3>${p.title}</h3>
<p>${p.location}</p>
<p class="price">₹ ${p.price}</p>

</div>

</div>

`

})

}

/* SEARCH */

function searchProperty(){

let text=searchInput.value.toLowerCase()

let list=JSON.parse(localStorage.getItem("properties"))||[]

propertyList.innerHTML=""

list.filter(p=>p.location.toLowerCase().includes(text))
.forEach((p,i)=>{

propertyList.innerHTML+=`

<div class="card">

<img src="${p.image}">

<div class="card-body">

<h3>${p.title}</h3>
<p>${p.location}</p>
<p class="price">₹ ${p.price}</p>

<button class="btn" onclick="viewProperty(${i})">View</button>

</div>

</div>

`

})

}

</script>

</body>
</html>
